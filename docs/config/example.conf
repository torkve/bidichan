# Example bidichan peer config.
#
# Drop this in one of:
#   $XDG_CONFIG_HOME/bidichan/<name>.conf     (default ~/.config/bidichan/)
#   /etc/bidichan/<name>.conf
# and invoke as: `bidichan listen <name>` or `bidichan connect <name>`.
#
# CLI flags override file values, so `bidichan connect <name> --psk DEAD…`
# uses the override and ignores the file's psk.
#
# Recommended mode: 0600 (owner-only) when the file holds a PSK inline.

# --- transport endpoint (pick exactly one of addr / unix-socket) ---

# TCP address.  Server: what to bind.  Client: what to dial.
addr           = cdn.example.com:443

# Unix socket (skips TLS — used when a reverse proxy terminates TLS for
# us).  Mutually exclusive with `addr`.
# unix-socket  = /run/bidichan/data.sock

# --- identity ---

# SNI hostname.  Server: must match the SNI the client presents and the
# inner Host: header.  Client: sent as both SNI and Host:.
hostname       = cdn.example.com

# Pre-shared key, hex.  Pick exactly one of `psk` (inline) or
# `psk-file` (path to a sibling file containing the hex on one line).
# Relative `psk-file` paths are resolved against the config file's
# directory.
psk-file       = ./psk.hex
# psk          = 4b4c000a6208b87f1db70ccd162f29ce70d87cfcb8908d50650b1d6b00dcb1ef

# --- shared ---

# WebSocket upgrade request path.  Both ends must agree; when unset, it is
# derived from the PSK (and logged at startup).  Pin it to match a fixed
# reverse-proxy `location`.
# path         = /ws

# Allow the peer to open an interactive shell on this host.  WARNING: this
# grants whoever holds the PSK full remote code execution here.  Default false;
# valid on both `listen` and `connect`.
# allow-shell  = true

# --- client-only ---

# Set when the server is behind a TLS-terminating reverse proxy and
# therefore can't share a certificate channel binding with us.
# Defaults to false; only relevant to `connect`.
# no-tls-binding = true

# PEM bundle to verify the server certificate against, for a self-signed or
# private-CA server.  Without it the system trust store is used.  Only
# relevant to `connect`.
# cacert       = ./server-cert.pem

# Channels to open automatically once the peer connects.  Repeatable — one
# line each, same syntax as `bidichan channel open`.  Only relevant to
# `connect`; the CLI --channel flag overrides this list.
# channel      = forward -L 8080:internal-api:8443
# channel      = socks5 --listen 127.0.0.1:1080

# --- server-only ---

# TLS cert / key for the listener.  Without these, bidichan generates a
# self-signed ECDSA cert in memory on every start.  Only relevant to
# `listen` in TCP mode (unix-socket mode skips TLS entirely).
# cert         = /etc/letsencrypt/live/cdn.example.com/fullchain.pem
# key          = /etc/letsencrypt/live/cdn.example.com/privkey.pem

# Real web backend that connections failing SNI/Host/auth are proxied to,
# so an unauthenticated client reaches a genuine site instead of a static
# page.  "host:port" or "unix:/path".  Only relevant to `listen`.
# decoy-backend = 127.0.0.1:8080

# --- control plane ---

# Where the local CLI talks to this daemon.  Default is
# $XDG_RUNTIME_DIR/bidichan-<pid>.sock; override when you run more than
# one daemon on the same host or want a stable path for `--socket`.
# socket       = /run/bidichan/cdn/control.sock
